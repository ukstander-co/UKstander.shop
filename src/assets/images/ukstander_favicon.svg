<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <!-- Glistening Royal Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE066" />
      <stop offset="50%" stop-color="#F5A623" />
      <stop offset="100%" stop-color="#E25C00" />
    </linearGradient>
    <!-- Deep Electric Blue Gradient -->
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="50%" stop-color="#0066FF" />
      <stop offset="100%" stop-color="#0022AA" />
    </linearGradient>
    <!-- Brilliant Union Jack Red Gradient -->
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3366" />
      <stop offset="100%" stop-color="#C4002B" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Premium Shopping Bag Handle / Shackle (Secure Shopping Logo Concept) -->
  <path d="M22 24 V18 C22 12.47 26.47 8 32 8 C37.53 8 42 12.47 42 18 V24" 
        stroke="url(#blue)" stroke-width="4.5" stroke-linecap="round" filter="url(#shadow)" />
        
  <!-- Outer glassmorphic glowing border of the Shopping Bag / Secure Vault -->
  <rect x="10" y="21" width="44" height="36" rx="9" 
        stroke="url(#blue)" stroke-width="3" filter="url(#shadow)" />

  <!-- Solid white stylish letter 'U' for UKStander (bold and legible at 16x16) -->
  <path d="M21 28 V36 C21 39.5 23.5 41.5 26.5 41.5 C29.5 41.5 32 39.5 32 36 V28" 
        stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
        
  <!-- Elegant overlapping gold 'S' for .shop / Stander, visually interlaced -->
  <path d="M30 31 C30 29.2 31.8 28 34.2 28 C36.5 28 38 29.2 38 31 C38 33.5 32 34 32 36.8 C32 39.5 34.2 40.5 36.8 40.5 C39.5 40.5 41 39.2 41 38" 
        stroke="url(#gold)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Red swoosh under the letters (matching UKStander.shop branding) -->
  <path d="M16 49 C 24 53.5 40 53.5 48 49" 
        stroke="url(#red)" stroke-width="3.5" stroke-linecap="round" />
</svg>
