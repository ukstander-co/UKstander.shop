name: Build and Continuous Deployment

on:
  push:
    branches:
      - main  # Triggers when code is pushed or merged into the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST || '79.72.94.8' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production
          NODE_OPTIONS: "--max-old-space-size=1536" # Prevent out-of-memory errors on build

      - name: Set up SSH configuration
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

      - name: Create Remote Environment File (.env)
        run: |
          # Clean raw secrets from any random newlines, carriage returns, or surrounding whitespace
          CLEAN_DB_URL=$(echo "${{ secrets.TURSO_DATABASE_URL }}" | tr -d '\r' | tr -d '\n' | xargs)
          CLEAN_DB_TOKEN=$(echo "${{ secrets.TURSO_AUTH_TOKEN }}" | tr -d '\r' | tr -d '\n' | xargs)
          CLEAN_JWT_SECRET=$(echo "${{ secrets.JWT_SECRET }}" | tr -d '\r' | tr -d '\n' | xargs)
          CLEAN_EXTERNAL_SYNC_KEY=$(echo "${{ secrets.EXTERNAL_SYNC_KEY }}" | tr -d '\r' | tr -d '\n' | xargs)
          CLEAN_RAINFOREST_API_KEY=$(echo "${{ secrets.RAINFOREST_API_KEY }}" | tr -d '\r' | tr -d '\n' | xargs)
          CLEAN_GROQ_API_KEY=$(echo "${{ secrets.GROQ_API_KEY }}" | tr -d '\r' | tr -d '\n' | xargs)
          CLEAN_PRODUCT_GROQ_API_KEY=$(echo "${{ secrets.PRODUCT_GROQ_API_KEY }}" | tr -d '\r' | tr -d '\n' | xargs)
          CLEAN_SHOPPING_ASSISTANT_GROQ_API_KEY=$(echo "${{ secrets.SHOPPING_ASSISTANT_GROQ_API_KEY }}" | tr -d '\r' | tr -d '\n' | xargs)
          CLEAN_GEMINI_API_KEY=$(echo "${{ secrets.GEMINI_API_KEY }}" | tr -d '\r' | tr -d '\n' | xargs)
          CLEAN_IMPROVMX_API_KEY=$(echo "${{ secrets.IMPROVMX_API_KEY }}" | tr -d '\r' | tr -d '\n' | xargs)
          CLEAN_APP_URL=$(echo "${{ secrets.APP_URL }}" | tr -d '\r' | tr -d '\n' | xargs)

          # Generate clean file with sanitized credentials
          cat <<EOF > .env.production
          NODE_ENV=production
          PORT=3000
          TURSO_DATABASE_URL="$CLEAN_DB_URL"
          TURSO_AUTH_TOKEN="$CLEAN_DB_TOKEN"
          JWT_SECRET="$CLEAN_JWT_SECRET"
          EXTERNAL_SYNC_KEY="$CLEAN_EXTERNAL_SYNC_KEY"
          RAINFOREST_API_KEY="$CLEAN_RAINFOREST_API_KEY"
          GROQ_API_KEY="$CLEAN_GROQ_API_KEY"
          PRODUCT_GROQ_API_KEY="$CLEAN_PRODUCT_GROQ_API_KEY"
          SHOPPING_ASSISTANT_GROQ_API_KEY="$CLEAN_SHOPPING_ASSISTANT_GROQ_API_KEY"
          GEMINI_API_KEY="$CLEAN_GEMINI_API_KEY"
          IMPROVMX_API_KEY="$CLEAN_IMPROVMX_API_KEY"
          APP_URL="$CLEAN_APP_URL"
          EOF

      - name: Synchronize build files to the VPS server
        run: |
          # Ensure deployment directory exists on the VPS
          ssh -i ~/.ssh/id_rsa ubuntu@$SSH_HOST "mkdir -p /home/ubuntu/ukstander-shop"
          
          # Deploy compiled distribution (Vite build assets & server files)
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            dist/ \
            ubuntu@$SSH_HOST:/home/ubuntu/ukstander-shop/dist/
            
          # Deploy configuration files
          rsync -avz \
            -e "ssh -i ~/.ssh/id_rsa" \
            package.json package-lock.json \
            ubuntu@$SSH_HOST:/home/ubuntu/ukstander-shop/

          # Deploy generated .env file safely to root of app directory on your server
          rsync -avz \
            -e "ssh -i ~/.ssh/id_rsa" \
            .env.production \
            ubuntu@$SSH_HOST:/home/ubuntu/ukstander-shop/.env

      - name: Install Production Dependencies and Restart/Start PM2 Process
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@$SSH_HOST '
            cd /home/ubuntu/ukstander-shop
            
            # Install production-only npm packages safely, avoiding devDependencies to keep build minimal
            npm install --omit=dev --no-audit --no-fund --prefer-offline
            
            # Release port 3000 if it is blocked by any old non-PM2 or orphaned process
            sudo fuser -k 3000/tcp || true
            
            # Always reset PM2 configuration to transition cleanly from "server.ts" to compiled "dist/server.cjs"
            if pm2 list | grep -q "ukstander-shop"; then
              echo "Deleting older PM2 script configuration..."
              pm2 delete ukstander-shop || true
            fi
            
            echo "Launching PM2 with the optimized, compiled dist/server.cjs bundle..."
            pm2 start dist/server.cjs --name "ukstander-shop" --env production
            
            # Save the current state of PM2 processes to withstand potential VPS restarts
            pm2 save
            
            # Display status check
            pm2 status
          '
